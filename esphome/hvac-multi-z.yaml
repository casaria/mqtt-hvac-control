# ─── TIME ─────────────────────────────────────────────────────────────────────
time:
  - platform: sntp
    id: current_time

# ─── LIGHTS ───────────────────────────────────────────────────────────────────
light:
  - platform: esp32_rmt_led_strip
    rgb_order: GRB
    pin: GPIO48
    num_leds: 1
    chipset: ws2812
    id: RGB_LED
    name: "RGB_LED"
    effects:
      - pulse:

  - platform: monochromatic
    output: led_status_rgb
    name: "led_status_rgb"
    effects:
      - pulse:
          name: "Fast Pulse"
          transition_length: 0.5s
          update_interval: 0.5s
          min_brightness: 0%
          max_brightness: 100%
      - pulse:
          name: "Slow Pulse"
          transition_length: 2s
          update_interval: 2s
          min_brightness: 10%
          max_brightness: 100%
      - pulse:
          name: "Asymmetrical Pulse"
          transition_length:
            on_length: 1s
            off_length: 500ms
          update_interval: 1.5s
          min_brightness: 0%
          max_brightness: 100%

  # ── Zone LED strips (10× WS2812B per zone, under thermostat base) ─────────
  # GPIO10–13: RMT-capable, free on ESP32-S3-DevKitC-1
  # Wire: 5V + GND from thermostat cable spares, data via 330Ω series resistor
  - platform: esp32_rmt_led_strip
    name: "Zone 1 LED"
    id: zone1_led
    rgb_order: GRB
    pin: GPIO10
    num_leds: 10
    chipset: ws2812
    rmt_symbols: 192
    effects:
      - pulse:
          name: "Slow Pulse"
          transition_length: 2s
          update_interval: 2s
          min_brightness: 10%
          max_brightness: 100%
      - strobe:
          name: "Fast Strobe"
          colors:
            - state: true
              brightness: 100%
              red: 100%
              green: 0%
              blue: 0%
              duration: 150ms
            - state: false
              brightness: 0%
              duration: 100ms

  - platform: esp32_rmt_led_strip
    name: "Zone 2 LED"
    id: zone2_led
    rgb_order: GRB
    pin: GPIO11
    num_leds: 10
