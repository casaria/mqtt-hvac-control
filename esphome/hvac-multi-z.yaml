    pin: { pcf8574: pcf8575_hub, number: 0, mode: { input: true }, inverted: false }
    filters: [ delayed_on: 5ms, delayed_off: 1400ms ]
    on_press:
      then:
        - switch.turn_on: furnace_Y_BLOWER
        - light.turn_on: { id: RGB_LED, brightness: 60%, red: 0%, green: 0%, blue: 80%, effect: pulse }
        # - cover.control: { id: HVAC_DAMPER_0, position: 0.5 }
        - mqtt.publish: { topic: "${mqtt_prefix}/floor1/zone0/mode", payload: "cool" }  # FIX #3: was ${mqtt_prefix}//mode
        - lambda: mqtt::global_mqtt_client->publish("${faikin_ac1}/command", "{\"power\":true,\"mode\":\"C\"}");
    on_release:
      then:
        - switch.turn_off: furnace_Y_BLOWER
        - light.turn_off: { id: RGB_LED }
        # - cover.close: HVAC_DAMPER_0
        - mqtt.publish: { topic: "${mqtt_prefix}/floor1/zone0/mode", payload: "idle" }
        - lambda: mqtt::global_mqtt_client->publish("${faikin_ac1}/command", "{\"power\":false,\"mode\":\"C\"}");

  - platform: gpio
    name: "THERM_0_W"
    id: ZONE_0_W
    trigger_on_initial_state: true
    pin: { pcf8574: pcf8575_hub, number: 1, mode: { input: true }, inverted: false }
    filters: [ delayed_on: 5ms, delayed_off: 1400ms ]
    on_press:
      then:
        - lambda: |-
            if ( id(sel_f1_heat_mode).current_option() == "heat_pump") {
              mqtt::global_mqtt_client->publish("${faikin_ac1}/command", "{\"power\":true,\"mode\":\"H\"}");
              id(furnace_Y_BLOWER).turn_on();
            } else if ( id(sel_f1_heat_mode).current_option() == "gas") {
              mqtt::global_mqtt_client->publish("${faikin_ac1}/command", "{\"power\":false,\"mode\":\"F\"}");
              id(furnace_W).turn_on();
            } else if ( id(sel_f1_heat_mode).current_option() == "combined") {
              mqtt::global_mqtt_client->publish("${faikin_ac1}/command", "{\"power\":true,\"mode\":\"H\"}");
