  # ── BME680 AQI ──────────────────────────────────────────────────────────────
  - platform: bme680
    i2c_id: bus_a
    address: 0x77
    update_interval: 10s
    temperature:
      name: "AQI Sensor Temperature"
      id: bme680_temp
      accuracy_decimals: 1
    humidity:
      name: "AQI Sensor Humidity"
      id: bme680_humidity
      accuracy_decimals: 1
    pressure:
      name: "AQI Sensor Pressure"
      accuracy_decimals: 1
    gas_resistance:
      name: "Gas Resistance"
      id: bme680_gas
      accuracy_decimals: 0
      unit_of_measurement: "Ω"
      icon: "mdi:chemical-weapon"

  # ── Calculated IAQ ────────────────────────────────────────────────────────
  - platform: template
    name: "IAQ Index"
    id: iaq_index
    icon: "mdi:air-filter"
    accuracy_decimals: 0
    unit_of_measurement: "IAQ"
    update_interval: 10s
    lambda: |-
      if (!id(bme680_gas).has_state() || !id(bme680_humidity).has_state())
        return NAN;
      float gas  = id(bme680_gas).state;
      float hum  = id(bme680_humidity).state;
      const float gas_ref = 250000.0f;
      float gas_score = gas / (gas + gas_ref) * 2.0f;
      if (gas_score > 1.0f) gas_score = 1.0f;
      float hum_score = (hum < 40.0f) ? (hum / 40.0f) : (1.0f - ((hum - 40.0f) / 60.0f));
      hum_score = std::max(0.0f, std::min(1.0f, hum_score));
      float combined = (gas_score * 0.75f) + (hum_score * 0.25f);
      float iaq = std::max(0.0f, std::min(500.0f, (1.0f - combined) * 500.0f));
      std::string cat;
      if      (iaq <= 50)  cat = "Excellent";
      else if (iaq <= 100) cat = "Good";
      else if (iaq <= 150) cat = "Lightly Polluted";
      else if (iaq <= 200) cat = "Moderately Polluted";
      else if (iaq <= 250) cat = "Heavily Polluted";
      else if (iaq <= 350) cat = "Severely Polluted";
      else                 cat = "Extremely Polluted";
      id(iaq_category).publish_state(cat);
      mqtt::global_mqtt_client->publish("${mqtt_prefix}/aqi/state", to_string((int)iaq));
      if (iaq > 150) {
        id(fan0).make_call().set_state(true).set_speed(100).perform();
      }
      return iaq;

