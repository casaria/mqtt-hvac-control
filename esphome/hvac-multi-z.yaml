# ===========================================================
#  HVAC_MULTI_Z — multi-Zone HVAC Controller  (Merged v2)
#  Board   : ESP32-S3-DevKitC-1
#  Framework: esp-idf
#
#  ┌─ FLOOR 1 (Zone 0) ──────────────────────────────────┐
#  │  • Daikin split via Faikin firmware (MQTT: Faikin/AC1)│
#  │  • Gas furnace on relay4_4_1 pins 4–6 (W1, W2, G)     │
#  │  • Thermostat inputs: PCF8575 pins 0–3               │
#  │  • Signal routing: relay4_4_1 (R1_1–R1_4)           │
#  │  • No damper or thermostat control on Floor 1        │
#  │  • Heating modes: heat_pump | gas | combined         │
#  └──────────────────────────────────────────────────────┘
#  ┌─ FLOOR 2 (4 zones) ─────────────────────────────────┐
#  │  • Daikin split via Faikin firmware (MQTT: Faikin/AC2)│
#  │  • Zones 1-3: hardwired thermostats, PCF8575 pins 4–15│
#  │  • Zone Bathroom: Zigbee wireless thermostat (TBD)   │
#  │    → Zigbee2MQTT publishes to MQTT_PREFIX/floor2/    │
#  │      bathroom/damper/position/set                    │
#  │  • 4× dampers: HVAC_DAMPER_0–3 (SSR_0–7, 2 per zone)│
#  │  • 4× PWM fans (fanhub_pwm0–3), auto-speed per zone │
#  │  • 3× DS18B20 zone temps + 4× BMP085 duct sensors   │
#  │  • BME680 AQI (calculated IAQ 0–500)                 │
#  └──────────────────────────────────────────────────────┘
#
#  Daikin integration: Faikin firmware on separate ESP32.
#  This device sends JSON to Faikin/{device}/command and
#  receives state from Faikin/{device}/state via MQTT.
#  No Arduino-dependent external component needed.
#
#  SSR assignment (PCF8574, 2-relay proportional, power-open + power-close):
#    SSR_0: Bathroom CLOSE   SSR_4: Zone 2 CLOSE
#    SSR_1: Bathroom OPEN    SSR_5: Zone 2 OPEN
#    SSR_2: Zone 1 CLOSE     SSR_6: Zone 3 CLOSE
#    SSR_3: Zone 1 OPEN      SSR_7: Zone 3 OPEN
#  All 4 dampers are Floor 2. Bathroom (SSR_0+1) thermostat TBD via Zigbee2MQTT.
#
#  Furnace relays on relay4_4_1 (PCA9554 0x38) — pins 0–3:  ← CONFIRMED correct
#    furnace_Y_BLOWER → relay4_4_1 pin 0
#    furnace_W        → relay4_4_1 pin 1
#    furnace_G        → relay4_4_1 pin 2
#    furnace_spare    → relay4_4_1 pin 3
#  Note: only 1 relay board total; no AUX relay
#
#  PCF8575 thermostat input pin map:
#    0-3: Zone 0  (Y1, W, G, OPT)   Floor 1
#    4-7: Zone 1  (Y1, W, G, OPT)   Floor 2
#    8-11: Zone 2 (Y1, W, G, OPT)   Floor 2
#   12-15: Zone 3 (Y1, W, G, OPT)   Floor 2
# ===========================================================

# [ADDED] — substitutions block; fixes $friendly_name references
substitutions:
  device_name:    hvac-multi-z
  friendly_name:  HVAC_MULTI_Z
  faikin_ac1:     "Faikout/AC1"     # Faikin device name for Floor 1 Daikin
  faikin_ac2:     "Faikout/AC2"     # Faikin device name for Floor 2 Daikin
  mqtt_prefix:    "HVAC_MULTI_Z"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  min_version: 2025.5.0
  name_add_mac_suffix: false
  comment: "multi-zone HVAC controller with timed dampers, PWM fan, and BME680 AQI"
  on_boot:
    priority: -100
    then:
      - mqtt.publish:
          topic: ${mqtt_prefix}/status
          payload: "online"
          retain: true

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

logger:

# ─── GLOBALS ──────────────────────────────────────────────────────────────────
globals:
  # Floor 2 coordinator state
  - id: floor2_mode       # 0=off 1=heat 2=cool 3=fan
    type: int
    restore_value: false
    initial_value: '0'
  - id: floor2_locked     # mode-change lockout (3 min compressor protection)
    type: bool
    restore_value: false
    initial_value: 'false'
  # Previous active state — used to detect zone satisfaction for LED flash
  - id: z1_was_active
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: z2_was_active
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: z3_was_active
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: bath_was_active
    type: bool
    restore_value: false
    initial_value: 'false'
  # Bathroom zone state — set via MQTT from Zigbee2MQTT (no hardwired thermostat)
  - id: bath_req_heat
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: bath_req_cool
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: bath_req_fan
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: bath_win_open
    type: bool
    restore_value: false
    initial_value: 'false'

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Hvac-Control Fallback Hotspot"
    password: !secret ap_password

captive_portal:

web_server:
  port: 80
  auth:
    username: !secret web_server_username
    password: !secret web_server_password
  version: 2

# ─── MQTT ────────────────────────────────────────────────────────────────────
mqtt:
  broker: !secret mqtt_broker
  username: !secret mqtt_username
  password: !secret mqtt_password
  topic_prefix: ${mqtt_prefix}
  birth_message:
    topic: ${mqtt_prefix}/status
    payload: online
    retain: true
  will_message:
    topic: ${mqtt_prefix}/status
    payload: offline
    retain: true

  on_message:

    # ── Floor 1 heating mode: heat_pump | gas | combined ──
    - topic: ${mqtt_prefix}/floor1/heat_mode/set
      then:
        - select.set:
            id: sel_f1_heat_mode
            option: !lambda "return x;"

    # ── Floor 1 scene preset ──────────────────────────────
    - topic: ${mqtt_prefix}/floor1/scene/set
      then:
        - lambda: |-
            std::string s = x;
            float temp = 21.0f;
            std::string mode = "H";
            std::string fan  = "A";
            if      (s == "morning") { temp = 21.0f; mode = "H"; }
            else if (s == "night")   { temp = 18.0f; mode = "H"; fan = "1"; }
            else if (s == "away")    { temp = 15.0f; mode = "H"; }
            else if (s == "eco")     { temp = 19.0f; mode = "H"; fan = "1"; }
            else if (s == "comfort") { temp = 22.0f; mode = "H";
                                      id(sel_f1_heat_mode).make_call().set_option("combined").perform(); }
            else if (s == "cool")    { temp = 24.0f; mode = "C"; }
            // Publish to Faikin AC1
            auto doc = std::string("{\"power\":true,\"mode\":\"") + mode +
                      "\",\"temp\":" + to_string((int)temp) +
                      ",\"fan\":\"" + fan + "\"}";
            mqtt::global_mqtt_client->publish("${faikin_ac1}/command", doc);

    # ── Floor 1 direct Faikin passthrough ─────────────────
    - topic: ${mqtt_prefix}/floor1/ac/command
      then:
        - lambda: |-
            mqtt::global_mqtt_client->publish("${faikin_ac1}/command", x);

    - topic: ${mqtt_prefix}/floor2/ac/command
      then:
        - lambda: |-
            mqtt::global_mqtt_client->publish("${faikin_ac2}/command", x);

    # ── Bathroom Zigbee thermostat demand (via Zigbee2MQTT) ──────────────────
    # Publish heat/cool/fan/off to these topics from a Zigbee2MQTT automation
    - topic: ${mqtt_prefix}/floor2/bathroom/demand/set
      then:
        - lambda: |-
            id(bath_req_heat) = (x == "heat");
            id(bath_req_cool) = (x == "cool");
            id(bath_req_fan)  = (x == "fan");
        - script.execute: update_f2_coordinator

    # Bathroom window sensor via Zigbee (reed switch on Zigbee contact sensor)
    - topic: ${mqtt_prefix}/floor2/bathroom/window/set
      then:
        - lambda: |-
            id(bath_win_open) = (x == "open" || x == "true" || x == "1");
        - script.execute: update_f2_coordinator

    # ── Floor 2 damper direct position override ───────────
    # Bathroom: triggered by Zigbee2MQTT automation once thermostat is configured
    - topic: ${mqtt_prefix}/floor2/bathroom/damper/position/set
      then:
        - cover.control:
            id: HVAC_DAMPER_0
            position: !lambda "return atof(x.c_str()) / 100.0f;"

    - topic: ${mqtt_prefix}/floor2/zone1/damper/position/set
      then:
        - cover.control:
            id: HVAC_DAMPER_1
            position: !lambda "return atof(x.c_str()) / 100.0f;"

    - topic: ${mqtt_prefix}/floor2/zone2/damper/position/set
      then:
        - cover.control:
            id: HVAC_DAMPER_2
            position: !lambda "return atof(x.c_str()) / 100.0f;"

    - topic: ${mqtt_prefix}/floor2/zone3/damper/position/set
      then:
        - cover.control:
            id: HVAC_DAMPER_3
            position: !lambda "return atof(x.c_str()) / 100.0f;"

    # ── System-wide commands ──────────────────────────────
    - topic: ${mqtt_prefix}/command
      then:
        - lambda: |-
            if (x == "all_off") {
              id(HVAC_DAMPER_0).make_call().set_command_close().perform();
              id(HVAC_DAMPER_1).make_call().set_command_close().perform();
              id(HVAC_DAMPER_2).make_call().set_command_close().perform();
              id(HVAC_DAMPER_3).make_call().set_command_close().perform();
              id(furnace_W).turn_off();
              id(furnace_G).turn_off();
              mqtt::global_mqtt_client->publish("${faikin_ac1}/command", "{\"power\":false}");
              mqtt::global_mqtt_client->publish("${faikin_ac2}/command", "{\"power\":false}");
            } else if (x == "away") {
              mqtt::global_mqtt_client->publish("${faikin_ac1}/command", "{\"power\":true,\"mode\":\"H\",\"temp\":15}");
              mqtt::global_mqtt_client->publish("${faikin_ac2}/command", "{\"power\":true,\"mode\":\"H\",\"temp\":15}");
              id(furnace_W).turn_off();
              id(furnace_G).turn_off();
            } else if (x == "night") {
              mqtt::global_mqtt_client->publish("${faikin_ac1}/command", "{\"power\":true,\"mode\":\"H\",\"temp\":18,\"fan\":\"3\"}");
              mqtt::global_mqtt_client->publish("${faikin_ac2}/command", "{\"power\":true,\"mode\":\"H\",\"temp\":18,\"fan\":\"3\"}");
            }

    # ── Receive Faikin AC state and re-publish ──
    - topic: "${faikin_ac1}/state"
      then:
        - mqtt.publish:
            topic: ${mqtt_prefix}/floor1/ac/state
            payload: !lambda "return x;"
            retain: true

    - topic: "${faikin_ac2}/state"
      then:
        - mqtt.publish:
            topic: ${mqtt_prefix}/floor2/ac/state
            payload: !lambda "return x;"
            retain: true

# ─── I2C ─────────────────────────────────────────────────────────────────────
i2c:
  - id: bus_a
    sda: 8
    scl: 9
    scan: true
    frequency: 200kHz
  # !! CLAUDE DO NOT TOUCH !! Must ask first — intentional spare bus; future use
  - id: bus_b
    sda: 16
    scl: 15
    scan: true
    frequency: 200kHz

# ─── TCA9548A I2C multiplexer ────────────────────────────────────────────────
tca9548a:
  - address: 0x70
    id: multiplex0
    i2c_id: bus_a
    channels:
      - bus_id: multiplex0channel0
        channel: 0
      - bus_id: multiplex0channel1
        channel: 1
      - bus_id: multiplex0channel2
        channel: 2
      - bus_id: multiplex0channel3
        channel: 3
      # !! CLAUDE DO NOT TOUCH !! Must ask first — channels 4+5 reserved/future use
      - bus_id: multiplex0channel4
        channel: 4
      - bus_id: multiplex0channel5
        channel: 5

# ─── One-Wire (DS2484 I2C-to-1-Wire bridge) ──────────────────────────────────
one_wire:
  - platform: ds2484
    i2c_id: bus_a

# ─── OUTPUTS ─────────────────────────────────────────────────────────────────
output:
  - platform: ledc
    pin: GPIO4
    frequency: 4500 Hz
    id: fanhub_pwm0
    inverted: true
    min_power: 0%
    max_power: 60%

  - platform: ledc
    pin: GPIO5
    frequency: 4500 Hz
    id: fanhub_pwm1
    inverted: true
    min_power: 0%
    max_power: 60%

  - platform: ledc
    pin: GPIO6
    frequency: 4500 Hz
    id: fanhub_pwm2
    inverted: true
    min_power: 0%
    max_power: 60%

  - platform: ledc
    pin: GPIO7
    frequency: 4500 Hz
    id: fanhub_pwm3
    inverted: true
    min_power: 0%
    max_power: 60%

  - platform: ledc
    pin: GPIO47
    id: led_status_rgb
    frequency: 4500 Hz
    inverted: true
    min_power: 0%
    max_power: 60%

# ─── FANS ────────────────────────────────────────────────────────────────────
# fan 0 AND 1 INSTALLED FOR 2ND FLOOR ONLY
# fan 2,3 spare channels

fan:
  - platform: speed
    output: fanhub_pwm0
    name: FAN_0
    id: fan0
    icon: "mdi:fan"
    on_turn_on:
      - output.set_level:
          id: fanhub_pwm0
          level: !lambda "return id(fan_speed_override0).state / 100.0;"
    on_turn_off:
      - delay: 0.1s
      - output.set_level:
          id: fanhub_pwm0
          level: 0.0

  - platform: speed
    output: fanhub_pwm1
    name: FAN_1
    id: fan1
    icon: "mdi:fan"
    on_turn_on:
      - output.set_level:
          id: fanhub_pwm1
          level: !lambda "return id(fan_speed_override1).state / 100.0;"
    on_turn_off:
      - delay: 0.1s
      - output.set_level:
          id: fanhub_pwm1
          level: 0.0

  - platform: speed
    output: fanhub_pwm2
    name: FAN_2
    id: fan2
    icon: "mdi:fan"
    on_turn_on:
      - output.set_level:
          id: fanhub_pwm2
          level: !lambda "return id(fan_speed_override2).state / 100.0;"
    on_turn_off:
      - delay: 1s
      - output.set_level:
          id: fanhub_pwm2
          level: 0.0

  - platform: speed
    output: fanhub_pwm3
    name: FAN_3
    id: fan3
    icon: "mdi:fan"
    on_turn_on:
      - output.set_level:
          id: fanhub_pwm3
          level: !lambda "return id(fan_speed_override3).state / 100.0;"
    on_turn_off:
      - delay: 1s
      - output.set_level:
          id: fanhub_pwm3
          level: 0.0

# ─── NUMBER sliders ───────────────────────────────────────────────────────────
number:
  - platform: template
    name: "Fan Speed Override 0"
    id: fan_speed_override0
    max_value: 100.0
    min_value: 0.0
    step: 2
    optimistic: true
    mode: slider
    on_value:
      then:
        - if:
            condition:
              fan.is_on: fan0
            then:
              - output.set_level:
                  id: fanhub_pwm0
                  level: !lambda "return x / 100.0;"

  - platform: template
    name: "Fan Speed Override 1"
    id: fan_speed_override1
    max_value: 100.0
    min_value: 0.0
    step: 2
    optimistic: true
    mode: slider
    on_value:
      then:
        - if:
            condition:
              fan.is_on: fan1
            then:
              - output.set_level:
                  id: fanhub_pwm1
                  level: !lambda "return x / 100.0;"

  - platform: template
    name: "Fan Speed Override 2"
    id: fan_speed_override2
    max_value: 100.0
    min_value: 0.0
    step: 2
    optimistic: true
    mode: slider
    on_value:
      then:
        - if:
            condition:
              fan.is_on: fan2
            then:
              - output.set_level:
                  id: fanhub_pwm2
                  level: !lambda "return x / 100.0;"

  - platform: template
    name: "Fan Speed Override 3"
    id: fan_speed_override3
    max_value: 100.0
    min_value: 0.0
    step: 2
    optimistic: true
    mode: slider
    on_value:
      then:
        - if:
            condition:
              fan.is_on: fan3
            then:
              - output.set_level:
                  id: fanhub_pwm3
                  level: !lambda "return x / 100.0;"

# ─── I2C GPIO EXPANDERS ───────────────────────────────────────────────────────
pca9554:
  - id: relay4_4_1
    address: 0x38
    i2c_id: bus_a
    # !! CLAUDE DO NOT TOUCH !! pin assignments confirmed correct by owner
    # pins 0–3: furnace relays (Y-BLOWER, W, G, spare)  ← confirmed
    # (header previously said 4-6; pins 0-3 is the correct wiring)

pcf8574:
  - id: pcf8574_hub
    i2c_id: bus_a
    address: 0x21
    pcf8575: false

  - id: pcf8575_hub
    i2c_id: bus_a
    address: 0x20
    pcf8575: true

# ─── SWITCHES ────────────────────────────────────────────────────────────────
switch:

  # ── SSR outputs via PCF8574 (pcf8574_hub 0x21) ───────────────────────────
  # 2 relays per damper: CLOSE relay + OPEN relay (proportional, bidirectional)
  # Floor 1: SSR_0 + SSR_1 in use (no duct damper; wired for other purpose)
  # Zone 1: SSR_2 (CLOSE) + SSR_3 (OPEN)
  # Zone 2: SSR_4 (CLOSE) + SSR_5 (OPEN)
  # Zone 3: SSR_6 (CLOSE) + SSR_7 (OPEN)

  # Floor 2 Bathroom damper — thermostat TBD (Zigbee2MQTT wireless thermostat)
  # HVAC_DAMPER_0 cover entity will be triggered via MQTT from Zigbee2MQTT bridge
  # once the Zigbee thermostat is configured. SSR_0/SSR_1 are wired and ready.
  - platform: gpio
    name: "Bathroom Damper CLOSE"
    id: SSR_0
    pin: { pcf8574: pcf8574_hub, number: 0, mode: { output: true }, inverted: true }

  - platform: gpio
    name: "Bathroom Damper OPEN"
    id: SSR_1
    pin: { pcf8574: pcf8574_hub, number: 1, mode: { output: true }, inverted: true }

  - platform: gpio
    name: "Zone 1 Damper CLOSE"
    id: SSR_2
    pin: { pcf8574: pcf8574_hub, number: 2, mode: { output: true }, inverted: true }

  - platform: gpio
    name: "Zone 1 Damper OPEN"
    id: SSR_3
    pin: { pcf8574: pcf8574_hub, number: 3, mode: { output: true }, inverted: true }

  - platform: gpio
    name: "Zone 2 Damper CLOSE"
    id: SSR_4
    pin: { pcf8574: pcf8574_hub, number: 4, mode: { output: true }, inverted: true }

  - platform: gpio
    name: "Zone 2 Damper OPEN"
    id: SSR_5
    pin: { pcf8574: pcf8574_hub, number: 5, mode: { output: true }, inverted: true }

  - platform: gpio
    name: "Zone 3 Damper CLOSE"
    id: SSR_6
    pin: { pcf8574: pcf8574_hub, number: 6, mode: { output: true }, inverted: true }

  - platform: gpio
    name: "Zone 3 Damper OPEN"
    id: SSR_7
    pin: { pcf8574: pcf8574_hub, number: 7, mode: { output: true }, inverted: true }

  # ── Gas furnace relays — relay4_4_1 (PCA9554 0x38) pins 0–3 ────────────────
  # !! CLAUDE DO NOT TOUCH !! Pin assignments confirmed correct by owner (item #6)
  # Pins 0-3: furnace (Y-BLOWER=0, W=1, G=2, spare=3)
  # Wire relay NO contacts to furnace 24 VAC thermostat terminals.
  # Relay COM to furnace C (common/24 VAC return).
  - platform: gpio
    name: "Furnace spare"
    id: furnace_spare
    pin: { pca9554: relay4_4_1, number: 3, mode: { output: true }, inverted: true }
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      - mqtt.publish: { topic: "${mqtt_prefix}/floor1/furnace/spare/state", payload: "on", retain: true }
    on_turn_off:
      - mqtt.publish: { topic: "${mqtt_prefix}/floor1/furnace/spare/state", payload: "off", retain: true }

  - platform: gpio
    name: "Furnace blower FAN"
    id: furnace_G
    pin: { pca9554: relay4_4_1, number: 2, mode: { output: true }, inverted: true }
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      - mqtt.publish: { topic: "${mqtt_prefix}/floor1/furnace/g/state", payload: "on", retain: true }
    on_turn_off:
      - mqtt.publish: { topic: "${mqtt_prefix}/floor1/furnace/g/state", payload: "off", retain: true }

  - platform: gpio
    name: "Furnace W (Heat)"
    id: furnace_W
    pin: { pca9554: relay4_4_1, number: 1, mode: { output: true }, inverted: true }
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      - mqtt.publish: { topic: "${mqtt_prefix}/floor1/furnace/w1/state", payload: "on", retain: true }
    on_turn_off:
      - mqtt.publish: { topic: "${mqtt_prefix}/floor1/furnace/w1/state", payload: "off", retain: true }

  - platform: gpio
    name: "Furnace Y-BLOWER"
    id: furnace_Y_BLOWER
    pin: { pca9554: relay4_4_1, number: 0, mode: { output: true }, inverted: true }
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      - mqtt.publish: { topic: "${mqtt_prefix}/floor1/furnace/y-blower/state", payload: "on", retain: true }
    on_turn_off:
      - mqtt.publish: { topic: "${mqtt_prefix}/floor1/furnace/y-blower/state", payload: "off", retain: true }

# ─── SELECT — Floor 1 Heating Mode ───────────────────────────────────────────
select:
  - platform: template
    id: sel_f1_heat_mode
    name: "Floor 1 Heating Mode"
    options: [ "heat_pump", "gas", "combined" ]
    initial_option: "heat_pump"
    optimistic: true
    restore_value: true
    on_value:
      then:
        - lambda: |-
            if (x == "heat_pump") {
              mqtt::global_mqtt_client->publish("${faikin_ac1}/command", "{\"power\":true,\"mode\":\"H\"}");
              id(furnace_W).turn_off();  // FIX #1: was furnace_W called twice; second call is now furnace_G
              id(furnace_G).turn_off();
            } else if (x == "gas") {
              mqtt::global_mqtt_client->publish("${faikin_ac1}/command", "{\"power\":false,\"mode\":\"F\"}");
              id(furnace_G).turn_on();
              id(furnace_W).turn_on();
            } else if (x == "combined") {
              mqtt::global_mqtt_client->publish("${faikin_ac1}/command", "{\"power\":true,\"mode\":\"H\"}");
              id(furnace_G).turn_on();
              id(furnace_W).turn_on();
            }
        - mqtt.publish:
            topic: ${mqtt_prefix}/floor1/heat_mode/state
            payload: !lambda "return x;"
            retain: true

# ─── COVERS — Zone Dampers (proportional, bidirectional, 2 relays each) ──────
#  Each damper motor has separate OPEN and CLOSE windings.
#  time_based platform tracks position automatically by timing partial travel.
#
#  ⚠ Never energise OPEN and CLOSE simultaneously.
#
#  All 4 dampers are Floor 2:
#  Damper 0: SSR_0 (CLOSE), SSR_1 (OPEN)  — Floor 2 Bathroom (Zigbee therm TBD)
#  Damper 1: SSR_2 (CLOSE), SSR_3 (OPEN)  — Floor 2 Zone 1
#  Damper 2: SSR_4 (CLOSE), SSR_5 (OPEN)  — Floor 2 Zone 2
#  Damper 3: SSR_6 (CLOSE), SSR_7 (OPEN)  — Floor 2 Zone 3

cover:
  # ── Bathroom damper — triggered via MQTT from Zigbee2MQTT when thermostat ready
  - platform: time_based
    name: "HVAC Damper Bathroom"
    id: HVAC_DAMPER_0
    device_class: damper
    assumed_state: true
    open_action:
      - switch.turn_off: SSR_0
      - switch.turn_on:  SSR_1
    close_action:
      - switch.turn_off: SSR_1
      - switch.turn_on:  SSR_0
    stop_action:
      - switch.turn_off: SSR_0
      - switch.turn_off: SSR_1
    open_duration: 90s
    close_duration: 90s
    on_idle:
      - mqtt.publish_json:
          topic: ${mqtt_prefix}/floor2/bathroom/damper/state
          retain: true
          payload: |-
            root["position"] = (int)(id(HVAC_DAMPER_0).position * 100);
            auto s = id(HVAC_DAMPER_0).current_operation;
            root["state"] = (s == esphome::cover::COVER_OPERATION_OPENING) ? "opening" :
                            (s == esphome::cover::COVER_OPERATION_CLOSING) ? "closing" : "stopped";

  - platform: time_based
    name: "HVAC Damper 1"
    id: HVAC_DAMPER_1
    device_class: damper
    assumed_state: true
    open_action:
      - switch.turn_off: SSR_2
      - switch.turn_on:  SSR_3
    close_action:
      - switch.turn_off: SSR_3
      - switch.turn_on:  SSR_2
    stop_action:
      - switch.turn_off: SSR_2
      - switch.turn_off: SSR_3
    open_duration: 90s
    close_duration: 90s
    on_idle:
      - mqtt.publish_json:
          topic: ${mqtt_prefix}/floor2/zone1/damper/state
          retain: true
          payload: |-
            root["position"] = (int)(id(HVAC_DAMPER_1).position * 100);
            auto s = id(HVAC_DAMPER_1).current_operation;
            root["state"] = (s == esphome::cover::COVER_OPERATION_OPENING) ? "opening" :
                            (s == esphome::cover::COVER_OPERATION_CLOSING) ? "closing" : "stopped";

  - platform: time_based
    name: "HVAC Damper 2"
    id: HVAC_DAMPER_2
    device_class: damper
    assumed_state: true
    open_action:
      - switch.turn_off: SSR_4
      - switch.turn_on:  SSR_5
    close_action:
      - switch.turn_off: SSR_5
      - switch.turn_on:  SSR_4
    stop_action:
      - switch.turn_off: SSR_4
      - switch.turn_off: SSR_5
    open_duration: 90s
    close_duration: 90s
    on_idle:
      - mqtt.publish_json:
          topic: ${mqtt_prefix}/floor2/zone2/damper/state
          retain: true
          payload: |-
            root["position"] = (int)(id(HVAC_DAMPER_2).position * 100);
            auto s = id(HVAC_DAMPER_2).current_operation;
            root["state"] = (s == esphome::cover::COVER_OPERATION_OPENING) ? "opening" :
                            (s == esphome::cover::COVER_OPERATION_CLOSING) ? "closing" : "stopped";

  - platform: time_based
    name: "HVAC Damper 3"
    id: HVAC_DAMPER_3
    device_class: damper
    assumed_state: true
    open_action:
      - switch.turn_off: SSR_6
      - switch.turn_on:  SSR_7
    close_action:
      - switch.turn_off: SSR_7
      - switch.turn_on:  SSR_6
    stop_action:
      - switch.turn_off: SSR_6
      - switch.turn_off: SSR_7
    open_duration: 90s
    close_duration: 90s
    on_idle:
      - mqtt.publish_json:
          topic: ${mqtt_prefix}/floor2/zone3/damper/state
          retain: true
          payload: |-
            root["position"] = (int)(id(HVAC_DAMPER_3).position * 100);
            auto s = id(HVAC_DAMPER_3).current_operation;
            root["state"] = (s == esphome::cover::COVER_OPERATION_OPENING) ? "opening" :
                            (s == esphome::cover::COVER_OPERATION_CLOSING) ? "closing" : "stopped";

# ─── SCRIPTS — Floor 2 coordinator + auxiliary ───────────────────────────────
script:

  # ── 3-minute compressor mode-change lockout ───────────────────────────────
  - id: mode_unlock_timer
    mode: restart
    then:
      - delay: 3min
      - lambda: "id(floor2_locked) = false;"

  # ── Satisfied flash: solid green for 4 s then re-run coordinator ──────────
  # Zone 1 (Master Bedroom)
  - id: satisfied_flash_z1
    mode: restart
    then:
      - light.turn_on:
          id: zone1_led
          red: 0%
          green: 100%
          blue: 15%
          brightness: 80%
          effect: "none"
      - delay: 4s
      - script.execute: update_f2_coordinator

  # Zone 2
  - id: satisfied_flash_z2
    mode: restart
    then:
      - light.turn_on:
          id: zone2_led
          red: 0%
          green: 100%
          blue: 15%
          brightness: 80%
          effect: "none"
      - delay: 4s
      - script.execute: update_f2_coordinator

  # Zone 3
  - id: satisfied_flash_z3
    mode: restart
    then:
      - light.turn_on:
          id: zone3_led
          red: 0%
          green: 100%
          blue: 15%
          brightness: 80%
          effect: "none"
      - delay: 4s
      - script.execute: update_f2_coordinator

  # Bathroom
  - id: satisfied_flash_bath
    mode: restart
    then:
      - light.turn_on:
          id: bath_led
          red: 0%
          green: 100%
          blue: 15%
          brightness: 80%
          effect: "none"
      - delay: 4s
      - script.execute: update_f2_coordinator

  # ── Main Floor 2 coordinator ──────────────────────────────────────────────
  # Called by any zone state change, window sensor change, IAQ update, or MQTT demand.
  # Handles: weighted voting, compressor mode, dampers, fans, zone LEDs, MQTT publish.
  - id: update_f2_coordinator
    mode: queued
    max_runs: 1
    then:
      - lambda: |-
          // ── Zone input state ──────────────────────────────────────────────
          // Indices: 0=Z1(master,w=2), 1=Z2(w=1), 2=Z3(w=1), 3=Bath(w=1)
          bool w_open[4] = {
              id(WIN_Z1).state,
              id(WIN_Z2).state,
              id(WIN_Z3).state,
              id(bath_win_open)
          };
          bool req_heat[4] = {
              id(ZONE_1_W).state,
              id(ZONE_2_W).state,
              id(ZONE_3_W).state,
              id(bath_req_heat)
          };
          bool req_cool[4] = {
              id(ZONE_1_Y1).state,
              id(ZONE_2_Y1).state,
              id(ZONE_3_Y1).state,
              id(bath_req_cool)
          };
          bool req_fan[4] = {
              id(ZONE_1_G).state && !req_heat[0] && !req_cool[0],
              id(ZONE_2_G).state && !req_heat[1] && !req_cool[1],
              id(ZONE_3_G).state && !req_heat[2] && !req_cool[2],
              id(bath_req_fan) && !req_heat[3] && !req_cool[3]
          };
          int weight[4] = {
              (int)id(z1_weight).state,
              (int)id(z2_weight).state,
              (int)id(z3_weight).state,
              (int)id(zbath_weight).state
          };

          // ── Duct satisfaction (within 0.5°C of setpoint while active) ────
          bool duct_ok[4] = {
              id(z1_duct_temp).has_state() && std::abs(id(z1_duct_temp).state - id(z1_duct_setpoint).state) <= 0.5f,
              id(z2_duct_temp).has_state() && std::abs(id(z2_duct_temp).state - id(z2_duct_setpoint).state) <= 0.5f,
              id(z3_duct_temp).has_state() && std::abs(id(z3_duct_temp).state - id(z3_duct_setpoint).state) <= 0.5f,
              false  // no duct sensor for bathroom
          };

          // ── Weighted majority vote (window-open zones excluded) ───────────
          int heat_score = 0, cool_score = 0, fan_score = 0;
          for (int i = 0; i < 4; i++) {
              if (w_open[i]) continue;
              if (req_heat[i]) heat_score += weight[i];
              if (req_cool[i]) cool_score += weight[i];
              if (req_fan[i])  fan_score  += weight[i];
          }
          int nm = 0;
          if      (heat_score > 0 && heat_score >= cool_score) nm = 1;
          else if (cool_score > heat_score && cool_score > 0)  nm = 2;
          else if (fan_score > 0)                              nm = 3;

          // ── Mode change with 3-min compressor lockout ─────────────────────
          int cm = id(floor2_mode);
          if (nm != cm) {
              bool can_switch = !id(floor2_locked) ||
                                nm == 0 ||
                                (cm == 1 && nm == 1) ||  // same mode
                                (cm == 2 && nm == 2) ||
                                (cm == 3 && nm == 3);
              if (can_switch) {
                  id(floor2_mode) = nm;
                  if (nm != 0 && cm != nm) {
                      id(floor2_locked) = true;
                      id(mode_unlock_timer).execute();
                  }
                  const char* cmds[] = {
                      "{\"power\":false}",
                      "{\"power\":true,\"mode\":\"H\",\"fan\":\"A\"}",
                      "{\"power\":true,\"mode\":\"C\",\"fan\":\"A\"}",
                      "{\"power\":true,\"mode\":\"F\",\"fan\":\"A\"}"
                  };
                  mqtt::global_mqtt_client->publish("${faikin_ac2}/command", cmds[nm]);
                  cm = nm;
              }
          }

          // ── Dampers: open if window-closed + request matches active mode ──
          // Array index: 0=Z1, 1=Z2, 2=Z3, 3=Bath
          // Damper entities: HVAC_DAMPER_1=Z1, HVAC_DAMPER_2=Z2, HVAC_DAMPER_3=Z3, HVAC_DAMPER_0=Bath
          bool open_d[4];
          for (int i = 0; i < 4; i++) {
              if (w_open[i]) { open_d[i] = false; continue; }
              open_d[i] = (cm==1 && req_heat[i]) ||
                          (cm==2 && req_cool[i]) ||
                          (cm==3 && req_fan[i]);
          }
          if (open_d[0]) id(HVAC_DAMPER_1).make_call().set_command_open().perform();
          else           id(HVAC_DAMPER_1).make_call().set_command_close().perform();
          if (open_d[1]) id(HVAC_DAMPER_2).make_call().set_command_open().perform();
          else           id(HVAC_DAMPER_2).make_call().set_command_close().perform();
          if (open_d[2]) id(HVAC_DAMPER_3).make_call().set_command_open().perform();
          else           id(HVAC_DAMPER_3).make_call().set_command_close().perform();
          if (open_d[3]) id(HVAC_DAMPER_0).make_call().set_command_open().perform();
          else           id(HVAC_DAMPER_0).make_call().set_command_close().perform();

          // ── Fan speeds: fan0 serves Z1+Z2, fan1 serves Z2+Z3 ─────────────
          int f0_cnt = (int)open_d[0] + (int)open_d[1];
          int f1_cnt = (int)open_d[1] + (int)open_d[2];
          if (f0_cnt == 0) id(fan0).make_call().set_state(false).perform();
          else             id(fan0).make_call().set_state(true).set_speed(f0_cnt==1?40:70).perform();
          if (f1_cnt == 0) id(fan1).make_call().set_state(false).perform();
          else             id(fan1).make_call().set_state(true).set_speed(f1_cnt==1?40:70).perform();

          // ── AQI level for idle-zone LED color ─────────────────────────────
          float iaq_val = id(iaq_index).has_state() ? id(iaq_index).state : 0.0f;
          int aqi_st = (iaq_val > 300) ? 9 : (iaq_val > 200) ? 8 : (iaq_val > 150) ? 7 : 0;

          // ── Zone LED updates ──────────────────────────────────────────────
          // LED order: zone1_led(idx0), zone2_led(idx1), zone3_led(idx2), bath_led(idx3)
          esphome::light::LightState* leds[4] = {
              id(zone1_led), id(zone2_led), id(zone3_led), id(bath_led)
          };
          // Track previous active state for satisfied-flash detection
          bool now_active[4];
          for (int i = 0; i < 4; i++)
              now_active[i] = req_heat[i] || req_cool[i] || req_fan[i];
          bool was_active[4] = {
              id(z1_was_active), id(z2_was_active),
              id(z3_was_active), id(bath_was_active)
          };

          for (int i = 0; i < 4; i++) {
              // Skip zones whose satisfied-flash script is actively running
              // (they will re-call coordinator on completion)
              if (was_active[i] && !now_active[i] && !w_open[i]) {
                  // Just went idle — satisfied flash will override LED
                  // (triggered below); skip LED update for this zone
                  continue;
              }

              auto c = leds[i]->make_call();

              if (w_open[i]) {
                  // Window open — red fast strobe (inhibited)
                  c.set_state(true); c.set_rgb(1.0f, 0.0f, 0.0f);
                  c.set_brightness(1.0f); c.set_effect("Fast Strobe");

              } else if (open_d[i] && duct_ok[i] && (req_heat[i] || req_cool[i])) {
                  // Active delivery AND duct reached setpoint — steady green (satisfied)
                  c.set_state(true); c.set_rgb(0.0f, 1.0f, 0.15f);
                  c.set_brightness(0.8f); c.set_effect("none");

              } else if (req_heat[i] && open_d[i]) {
                  // Heating — warm orange slow pulse
                  c.set_state(true); c.set_rgb(1.0f, 0.55f, 0.0f);
                  c.set_brightness(0.8f); c.set_effect("Slow Pulse");

              } else if (req_cool[i] && open_d[i]) {
                  // Cooling — cool blue slow pulse
                  c.set_state(true); c.set_rgb(0.0f, 0.53f, 1.0f);
                  c.set_brightness(0.8f); c.set_effect("Slow Pulse");

              } else if (req_fan[i] && open_d[i]) {
                  // Fan-only — dim white slow pulse
                  c.set_state(true); c.set_rgb(1.0f, 1.0f, 1.0f);
                  c.set_brightness(0.3f); c.set_effect("Slow Pulse");

              } else if (req_heat[i] || req_cool[i]) {
                  // Queued — requesting but mode mismatch — amber slow pulse
                  c.set_state(true); c.set_rgb(1.0f, 0.9f, 0.0f);
                  c.set_brightness(0.5f); c.set_effect("Slow Pulse");

              } else if (aqi_st == 9) {
                  // IAQ critical (>300) — red slow pulse
                  c.set_state(true); c.set_rgb(1.0f, 0.0f, 0.0f);
                  c.set_brightness(0.7f); c.set_effect("Slow Pulse");

              } else if (aqi_st == 8) {
                  // IAQ severe (>200) — deep orange steady
                  c.set_state(true); c.set_rgb(1.0f, 0.4f, 0.0f);
                  c.set_brightness(0.6f); c.set_effect("none");

              } else if (aqi_st == 7) {
                  // IAQ warning (>150) — yellow slow pulse
                  c.set_state(true); c.set_rgb(1.0f, 0.9f, 0.0f);
                  c.set_brightness(0.4f); c.set_effect("Slow Pulse");

              } else {
                  // Idle + good air — LED off
                  c.set_state(false);
              }
              c.perform();
          }

          // ── Trigger satisfied flash for zones that just went idle ─────────
          if (was_active[0] && !now_active[0] && !w_open[0]) id(satisfied_flash_z1).execute();
          if (was_active[1] && !now_active[1] && !w_open[1]) id(satisfied_flash_z2).execute();
          if (was_active[2] && !now_active[2] && !w_open[2]) id(satisfied_flash_z3).execute();
          if (was_active[3] && !now_active[3] && !w_open[3]) id(satisfied_flash_bath).execute();

          // ── Update was_active globals ─────────────────────────────────────
          id(z1_was_active)   = now_active[0];
          id(z2_was_active)   = now_active[1];
          id(z3_was_active)   = now_active[2];
          id(bath_was_active) = now_active[3];

          // ── MQTT floor2 mode publish ──────────────────────────────────────
          const char* ms[] = {"off", "heat", "cool", "fan"};
          mqtt::global_mqtt_client->publish(
              "${mqtt_prefix}/floor2/mode/state", ms[cm], 0, true);

# ─── SENSORS ─────────────────────────────────────────────────────────────────
sensor:
  # ── DS18B20 zone temperatures ─────────────────────────────────────────────
  - platform: dallas_temp
    address: 0x6100000075e91f28
    name: "Zone 1 Duct Temperature"
    id: z1_duct_temp
    resolution: 12
    update_interval: 10s
    on_value:
      - mqtt.publish:
          topic: ${mqtt_prefix}/floor2/zone1/temperature
          payload: !lambda "return to_string(x);"
      - script.execute: update_f2_coordinator   # re-evaluate duct satisfaction

  - platform: dallas_temp
    address: 0x00000000000002
    name: "Zone 2 Duct Temperature"
    id: z2_duct_temp
    resolution: 12
    update_interval: 10s
    on_value:
      - mqtt.publish:
          topic: ${mqtt_prefix}/floor2/zone2/temperature
          payload: !lambda "return to_string(x);"
      - script.execute: update_f2_coordinator

  - platform: dallas_temp
    address: 0x00000000000003
    name: "Zone 3 Duct Temperature"
    id: z3_duct_temp
    resolution: 12
    update_interval: 10s
    on_value:
      - mqtt.publish:
          topic: ${mqtt_prefix}/floor2/zone3/temperature
          payload: !lambda "return to_string(x);"
      - script.execute: update_f2_coordinator

  - platform: dallas_temp
    address: 0x00000000000004
    name: "Zone 0 Duct Temperature"
    id: z0_duct_temp
    resolution: 12
    update_interval: 10s
    on_value:
      - mqtt.publish:
          topic: ${mqtt_prefix}/floor1/zone0/temperature
          payload: !lambda "return to_string(x);"

  # ── BMP085 duct pressure/temp via TCA9548A ────────────────────────────────
  - platform: bmp085
    i2c_id: multiplex0channel0
    address: 0x76
    temperature: { name: "Duct 1 Temp" }
    pressure:    { name: "Duct 1 Pressure" }
    update_interval: 30s

  - platform: bmp085
    i2c_id: multiplex0channel1
    address: 0x76
    temperature: { name: "Duct 2 Temp" }
    pressure:    { name: "Duct 2 Pressure" }
    update_interval: 30s

  - platform: bmp085
    i2c_id: multiplex0channel2
    address: 0x76
    temperature: { name: "Duct 3 Temp" }
    pressure:    { name: "Duct 3 Pressure" }
    update_interval: 30s

  - platform: bmp085
    i2c_id: multiplex0channel3
    address: 0x76
    temperature: { name: "Duct 4 Temp" }
    pressure:    { name: "Duct 4 Pressure" }
    update_interval: 30s

  # ── BME680 AQI ──────────────────────────────────────────────────────────────
  - platform: bme680
    i2c_id: bus_a
    address: 0x77
    update_interval: 10s
    temperature:
      name: "AQI Sensor Temperature"
      id: bme680_temp
      accuracy_decimals: 1
    humidity:
      name: "AQI Sensor Humidity"
      id: bme680_humidity
      accuracy_decimals: 1
    pressure:
      name: "AQI Sensor Pressure"
      accuracy_decimals: 1
    gas_resistance:
      name: "Gas Resistance"
      id: bme680_gas
      accuracy_decimals: 0
      unit_of_measurement: "Ω"
      icon: "mdi:chemical-weapon"

  # ── Calculated IAQ ────────────────────────────────────────────────────────
  - platform: template
    name: "IAQ Index"
    id: iaq_index
    icon: "mdi:air-filter"
    accuracy_decimals: 0
    unit_of_measurement: "IAQ"
    update_interval: 10s
    lambda: |-
      if (!id(bme680_gas).has_state() || !id(bme680_humidity).has_state())
        return NAN;
      float gas  = id(bme680_gas).state;
      float hum  = id(bme680_humidity).state;
      const float gas_ref = 250000.0f;
      float gas_score = gas / (gas + gas_ref) * 2.0f;
      if (gas_score > 1.0f) gas_score = 1.0f;
      float hum_score = (hum < 40.0f) ? (hum / 40.0f) : (1.0f - ((hum - 40.0f) / 60.0f));
      hum_score = std::max(0.0f, std::min(1.0f, hum_score));
      float combined = (gas_score * 0.75f) + (hum_score * 0.25f);
      float iaq = std::max(0.0f, std::min(500.0f, (1.0f - combined) * 500.0f));
      std::string cat;
      if      (iaq <= 50)  cat = "Excellent";
      else if (iaq <= 100) cat = "Good";
      else if (iaq <= 150) cat = "Lightly Polluted";
      else if (iaq <= 200) cat = "Moderately Polluted";
      else if (iaq <= 250) cat = "Heavily Polluted";
      else if (iaq <= 350) cat = "Severely Polluted";
      else                 cat = "Extremely Polluted";
      id(iaq_category).publish_state(cat);
      mqtt::global_mqtt_client->publish("${mqtt_prefix}/aqi/state", to_string((int)iaq));
      if (iaq > 150) {
        id(fan0).make_call().set_state(true).set_speed(100).perform();
      }
      // Update zone LED AQI colours on idle zones
      id(update_f2_coordinator).execute();
      return iaq;

  # ── Diagnostics ──────────────────────────────────────────────────────────
  - platform: wifi_signal
    name: "HVAC Controller WiFi Signal"
    update_interval: 60s

# ─── BINARY SENSORS ──────────────────────────────────────────────────────────
binary_sensor:
  # ── ZONE 0 thermostat inputs (Floor 1) — PCF8575 pins 0–3 ───────────────
  - platform: gpio
    name: "THERM_0_G"
    id: ZONE_0_G
    trigger_on_initial_state: true
    pin: { pcf8574: pcf8575_hub, number: 2, mode: { input: true }, inverted: false }
    filters: [ delayed_on: 5ms, delayed_off: 1400ms ]
    on_press:
      then:
        - switch.turn_on: furnace_G
        - mqtt.publish: { topic: "${mqtt_prefix}/floor1/zone0/mode", payload: "fan" }
        - light.turn_on: { id: RGB_LED, brightness: 60%, red: 0%, green: 80%, blue: 0%, effect: pulse }
    on_release:
      then:
        - switch.turn_off: furnace_G
        - light.turn_off: { id: RGB_LED }
        - mqtt.publish: { topic: "${mqtt_prefix}/floor1/zone0/mode", payload: "idle" }

  - platform: gpio
    name: "THERM_0_Y1"
    id: ZONE_0_Y1
    trigger_on_initial_state: true
    pin: { pcf8574: pcf8575_hub, number: 0, mode: { input: true }, inverted: false }
    filters: [ delayed_on: 5ms, delayed_off: 1400ms ]
    on_press:
      then:
        - switch.turn_on: furnace_Y_BLOWER
        - light.turn_on: { id: RGB_LED, brightness: 60%, red: 0%, green: 0%, blue: 80%, effect: pulse }
        # - cover.control: { id: HVAC_DAMPER_0, position: 0.5 }
        - mqtt.publish: { topic: "${mqtt_prefix}/floor1/zone0/mode", payload: "cool" }  # FIX #3: was ${mqtt_prefix}//mode
        - lambda: mqtt::global_mqtt_client->publish("${faikin_ac1}/command", "{\"power\":true,\"mode\":\"C\"}");
    on_release:
      then:
        - switch.turn_off: furnace_Y_BLOWER
        - light.turn_off: { id: RGB_LED }
        # - cover.close: HVAC_DAMPER_0
        - mqtt.publish: { topic: "${mqtt_prefix}/floor1/zone0/mode", payload: "idle" }
        - lambda: mqtt::global_mqtt_client->publish("${faikin_ac1}/command", "{\"power\":false,\"mode\":\"C\"}");

  - platform: gpio
    name: "THERM_0_W"
    id: ZONE_0_W
    trigger_on_initial_state: true
    pin: { pcf8574: pcf8575_hub, number: 1, mode: { input: true }, inverted: false }
    filters: [ delayed_on: 5ms, delayed_off: 1400ms ]
    on_press:
      then:
        - lambda: |-
            if ( id(sel_f1_heat_mode).current_option() == "heat_pump") {
              mqtt::global_mqtt_client->publish("${faikin_ac1}/command", "{\"power\":true,\"mode\":\"H\"}");
              id(furnace_Y_BLOWER).turn_on();
            } else if ( id(sel_f1_heat_mode).current_option() == "gas") {
              mqtt::global_mqtt_client->publish("${faikin_ac1}/command", "{\"power\":false,\"mode\":\"F\"}");
              id(furnace_W).turn_on();
            } else if ( id(sel_f1_heat_mode).current_option() == "combined") {
              mqtt::global_mqtt_client->publish("${faikin_ac1}/command", "{\"power\":true,\"mode\":\"H\"}");
              id(furnace_W).turn_on();
            };
        - light.turn_on: { id: RGB_LED, brightness: 60%, red: 80%, green: 0%, blue: 10%, effect: pulse }
        - mqtt.publish: { topic: "${mqtt_prefix}/floor1/zone0/mode", payload: "heat" }
    on_release:
      then:
        - switch.turn_off: furnace_W
        - light.turn_off: { id: RGB_LED }
        - mqtt.publish: { topic: "${mqtt_prefix}/floor1/zone0/mode", payload: "idle" }
        - lambda: mqtt::global_mqtt_client->publish("${faikin_ac1}/command", "{\"power\":false,\"mode\":\"H\"}");  # FIX #2: was faikin_ac2

  - platform: gpio
    name: "THERM_0_OPT"
    id: ZONE_0_OPT
    trigger_on_initial_state: true
    pin: { pcf8574: pcf8575_hub, number: 3, mode: { input: true }, inverted: false }
    filters: [ delayed_on: 5ms, delayed_off: 1400ms ]
    on_press:
      then:
        - switch.turn_on: furnace_spare
        - light.turn_on: { id: RGB_LED, brightness: 60%, red: 70%, green: 30%, blue: 2%, effect: pulse }
    on_release:
      then:
        - switch.turn_off: furnace_spare
        - light.turn_off: { id: RGB_LED }

  # ── ZONE 1 thermostat inputs (Floor 2, Master Bedroom) — PCF8575 pins 4–7 ─
  - platform: gpio
    name: "Zone 1 Cool Request"
    id: ZONE_1_Y1
    trigger_on_initial_state: true
    pin: { pcf8574: pcf8575_hub, number: 4, mode: { input: true }, inverted: false }
    filters: [ delayed_on: 5ms, delayed_off: 1400ms ]
    on_press:
