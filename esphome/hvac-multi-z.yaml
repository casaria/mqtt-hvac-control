# ─── TEXT SENSORS ─────────────────────────────────────────────────────────────
text_sensor:
  - platform: wifi_info
    ip_address:
      name: "${friendly_name} IP Address"

  - platform: template
    name: "${friendly_name} Uptime"
    id: uptime_human
    icon: mdi:clock-start
    update_interval: 60s
    lambda: |-
      uint32_t s = millis() / 1000;
      uint32_t d = s / 86400; s %= 86400;
      uint32_t h = s / 3600;  s %= 3600;
      uint32_t m = s / 60;    s %= 60;
      char buf[32];
      snprintf(buf, sizeof(buf), "%ud %02uh %02um %02us", d, h, m, s);
      return {buf};

  - platform: template
    name: "Air Quality Category"
    id: iaq_category
    icon: "mdi:leaf"
    lambda: "return {\"Initializing...\"};"

# ─── TIME ─────────────────────────────────────────────────────────────────────
time:
  - platform: sntp
    id: current_time

# ─── LIGHTS ───────────────────────────────────────────────────────────────────
light:
  - platform: esp32_rmt_led_strip
    rgb_order: GRB
    pin: GPIO48
    num_leds: 1
    chipset: ws2812
    id: RGB_LED
    name: "RGB_LED"
    effects:
      - pulse:

  - platform: monochromatic
    output: led_status_rgb
    name: "led_status_rgb"
    effects:
      - pulse:
          name: "Fast Pulse"
          transition_length: 0.5s
          update_interval: 0.5s
          min_brightness: 0%
          max_brightness: 100%
      - pulse:
          name: "Slow Pulse"
          transition_length: 2s
          update_interval: 2s
          min_brightness: 10%
          max_brightness: 100%
      - pulse:
          name: "Asymmetrical Pulse"
          transition_length:
            on_length: 1s
            off_length: 500ms
          update_interval: 1.5s
          min_brightness: 0%
          max_brightness: 100%
