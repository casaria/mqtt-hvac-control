  # Duct temperature setpoints for satisfaction detection.
  # Set to expected supply-air temp for the current season:
  #   Heat mode: ~35–40°C  |  Cool mode: ~10–14°C
  - platform: template
    name: "Zone 1 Duct Setpoint"
    id: z1_duct_setpoint
    icon: "mdi:thermometer-check"
    unit_of_measurement: "°C"
    min_value: 5.0
    max_value: 60.0
    step: 0.5
    initial_value: 35.0
    restore_value: true
    optimistic: true

  - platform: template
