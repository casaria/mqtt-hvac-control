  # ── AQI alerts ──────────────────────────────────────────────────────────
  - platform: template
    name: "Air Quality Warning"
    id: aqi_warning
    device_class: problem
    icon: "mdi:air-filter"
    lambda: "return id(iaq_index).has_state() && id(iaq_index).state > 150;"

  - platform: template
    name: "Air Quality Alert"
    id: aqi_alert
    device_class: problem
    icon: "mdi:smog"
    lambda: "return id(iaq_index).has_state() && id(iaq_index).state > 200;"

  - platform: template
    name: "Air Quality Critical"
    id: aqi_critical
    device_class: problem
    icon: "mdi:skull-crossbones"
    lambda: "return id(iaq_index).has_state() && id(iaq_index).state > 300;"

# ─── TEXT SENSORS ─────────────────────────────────────────────────────────────
text_sensor:
  - platform: wifi_info
    ip_address:
      name: "${friendly_name} IP Address"

  - platform: template
    name: "${friendly_name} Uptime"
    id: uptime_human
    icon: mdi:clock-start
    update_interval: 60s
    lambda: |-
      uint32_t s = millis() / 1000;
      uint32_t d = s / 86400; s %= 86400;
      uint32_t h = s / 3600;  s %= 3600;
      uint32_t m = s / 60;    s %= 60;
      char buf[32];
      snprintf(buf, sizeof(buf), "%ud %02uh %02um %02us", d, h, m, s);
      return {buf};

  - platform: template
    name: "Air Quality Category"
    id: iaq_category
    icon: "mdi:leaf"
    lambda: "return {\"Initializing...\"};"

# ─── NUMBER ENTITIES — zone weights & duct setpoints ─────────────────────────
number:
  # Zone priority weights (1–5). Zone 1 = Master Bedroom, default weight 2.
  - platform: template
    name: "Zone 1 Priority Weight"
    id: z1_weight
    icon: "mdi:weight"
    min_value: 1
    max_value: 5
    step: 1
    initial_value: 2
    restore_value: true
    optimistic: true
    on_value:
      then:
        - script.execute: update_f2_coordinator

  - platform: template
    name: "Zone 2 Priority Weight"
    id: z2_weight
    icon: "mdi:weight"
    min_value: 1
    max_value: 5
    step: 1
    initial_value: 1
    restore_value: true
    optimistic: true
    on_value:
      then:
        - script.execute: update_f2_coordinator

  - platform: template
